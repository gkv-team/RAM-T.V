/* ============================================================
   MERIDIAN LINE — Prototype Design System
   colors_and_type.css

   A monochrome, low-fidelity "wireframe prototype" kit used to
   pitch corporate logistics websites. Grayscale surfaces, blue-grey
   strokes, black pill buttons, Inter throughout.

   Load Inter (Google Fonts) before this file:
   <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
   ============================================================ */

:root {
  /* ---------- Base palette ---------- */
  --ml-white:        #ffffff;
  --ml-black:        #000000;
  --ml-ink:          #060606;   /* near-black body text */
  --ml-ink-900:      #141414;   /* footer bg, strong headings */
  --ml-ink-800:      #1b1b1b;   /* dark surfaces / strong text */
  --ml-ink-700:      #2a2a2a;

  /* Wireframe / placeholder grays (the defining motif) */
  --ml-wire:         #585858;   /* image + media placeholder fill (most used color) */
  --ml-wire-2:       #c4c4c4;   /* logo / faint marks */

  /* Surfaces */
  --ml-surface-1:    #f4f5f6;   /* primary card / panel */
  --ml-surface-2:    #f0f0f0;   /* alternate form panel */
  --ml-surface-3:    #fafbfc;   /* hover lift */

  /* Text */
  --ml-text:         #060606;   /* primary */
  --ml-text-2:       #616161;   /* secondary body */
  --ml-text-slate:   #657981;   /* slate body inside cards */
  --ml-text-slate-2: #576b7e;   /* deeper slate */
  --ml-text-muted:   #92a4b7;   /* muted blue-grey captions */
  --ml-text-nav:     #79828d;   /* nav + breadcrumb */
  --ml-text-faint:   #a6b2b7;   /* input placeholders */

  /* Blue-grey strokes (only chroma in the system) */
  --ml-border:       #d0e0e5;   /* default hairline */
  --ml-border-2:     #c3d2e0;   /* card stroke */
  --ml-border-input: #c9d1d3;   /* input outline */
  --ml-border-badge: #c1d1d7;   /* date / tag chips */

  /* Steppe (requisites block) — substitute below */
  --ml-steppe-head:  #262a31;
  --ml-steppe-label: #9da6b7;

  /* ---------- Radii ---------- */
  --ml-r-pill:    50px;  /* buttons, inputs */
  --ml-r-card-lg: 30px;  /* hero panel, large sections */
  --ml-r-card:    20px;  /* standard cards */
  --ml-r-sm:      10px;  /* small media tiles */
  --ml-r-badge:    5px;  /* chips / date tags */

  /* ---------- Spacing (8pt base, page gutter 160) ---------- */
  --ml-gutter:   160px;  /* page side margin @1920 */
  --ml-maxw:    1600px;  /* content column width */
  --ml-s-1:  8px;
  --ml-s-2: 16px;
  --ml-s-3: 24px;
  --ml-s-4: 32px;
  --ml-s-5: 40px;
  --ml-s-6: 60px;
  --ml-s-7: 80px;

  /* ---------- Shadow (used sparingly — wireframes are flat) ---------- */
  --ml-shadow-card: 0 1px 2px rgba(20,20,20,0.04);
  --ml-shadow-hover: 0 8px 24px rgba(29,36,49,0.08);

  /* ---------- Type families ---------- */
  --ml-font: "Inter", -apple-system, "Segoe UI", Roboto, sans-serif;
  /* Steppe (Cyrillic) & PF BeauSans Pro are not on Google Fonts —
     substituted with Inter. See README "Typography / substitutions". */
  --ml-font-steppe: "Inter", sans-serif;
}

/* ============================================================
   BASE TYPE STYLES
   Inter, with a tight scale. Headings use Medium (500); body Regular.
   ============================================================ */

.ml-display {            /* hero slogan */
  font-family: var(--ml-font);
  font-weight: 500;
  font-size: 52px;
  line-height: 1.0;
  letter-spacing: -0.01em;
  color: var(--ml-black);
}

.ml-h1 {                 /* big section / form heading */
  font-family: var(--ml-font);
  font-weight: 500;
  font-size: 46px;
  line-height: 52px;
  letter-spacing: -0.01em;
  color: var(--ml-black);
}

.ml-h2 {                 /* section heading ("Наши преимущества") */
  font-family: var(--ml-font);
  font-weight: 500;
  font-size: 32px;
  line-height: 1.15;
  color: var(--ml-ink-900);
}

.ml-h3 {                 /* sub-section */
  font-family: var(--ml-font);
  font-weight: 500;
  font-size: 26px;
  line-height: 1.2;
  color: var(--ml-ink-900);
}

.ml-h4 {                 /* card title */
  font-family: var(--ml-font);
  font-weight: 500;
  font-size: 22px;
  line-height: 1.4;
  color: var(--ml-ink-900);
}

.ml-body-lg {            /* lead paragraph */
  font-family: var(--ml-font);
  font-weight: 400;
  font-size: 16px;
  line-height: 28px;
  color: var(--ml-text-slate);
}

.ml-body {               /* default body */
  font-family: var(--ml-font);
  font-weight: 400;
  font-size: 15px;
  line-height: 26px;
  color: var(--ml-text-2);
}

.ml-body-hero {          /* hero supporting copy (light weight) */
  font-family: var(--ml-font);
  font-weight: 300;
  font-size: 16px;
  line-height: 26px;
  color: var(--ml-black);
}

.ml-small {              /* captions, meta */
  font-family: var(--ml-font);
  font-weight: 400;
  font-size: 14px;
  line-height: 26px;
  color: var(--ml-text-muted);
}

.ml-nav {                /* nav links + breadcrumbs */
  font-family: var(--ml-font);
  font-weight: 500;
  font-size: 13px;
  line-height: 1.4;
  color: var(--ml-text-nav);
}

.ml-stat-num {           /* big statistics */
  font-family: var(--ml-font);
  font-weight: 500;
  font-size: 46px;
  line-height: 1.0;
  color: var(--ml-black);
}

/* ============================================================
   ELEMENTS
   ============================================================ */

/* Primary pill button (black) */
.ml-btn {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  gap: 10px;
  padding: 16px 40px;
  border-radius: var(--ml-r-pill);
  background: var(--ml-black);
  color: var(--ml-white);
  font-family: var(--ml-font);
  font-weight: 500;
  font-size: 15px;
  line-height: 1;
  border: none;
  cursor: pointer;
  transition: background .18s ease, transform .12s ease;
}
.ml-btn:hover { background: var(--ml-ink-700); }
.ml-btn:active { transform: scale(.98); }

/* Small pill button ("Подробнее") */
.ml-btn-sm {
  padding: 10px 22px;
  font-size: 14px;
}

/* Ghost / outline pill (e.g. "Смотреть все") */
.ml-btn-ghost {
  background: transparent;
  color: var(--ml-ink-900);
  border: 1px solid var(--ml-border-2);
}
.ml-btn-ghost:hover { background: var(--ml-surface-1); }

/* Chip / date tag */
.ml-chip {
  display: inline-flex;
  align-items: center;
  padding: 4px 10px;
  border-radius: var(--ml-r-badge);
  border: 1px solid var(--ml-border-badge);
  font-family: var(--ml-font);
  font-size: 14px;
  line-height: 26px;
  color: var(--ml-text-slate-2);
  background: var(--ml-white);
}

/* Card */
.ml-card {
  background: var(--ml-surface-1);
  border-radius: var(--ml-r-card);
  border: 1px solid var(--ml-border);
  padding: 28px;
}

/* Pill input */
.ml-input {
  width: 100%;
  height: 61px;
  padding: 0 22px;
  border-radius: var(--ml-r-pill);
  border: 1px solid var(--ml-border-input);
  background: var(--ml-white);
  font-family: var(--ml-font);
  font-size: 14px;
  color: var(--ml-text);
}
.ml-input::placeholder { color: var(--ml-text-faint); }
.ml-input:focus { outline: none; border-color: var(--ml-text-nav); }

/* Wireframe media placeholder (the signature motif) — gray box with X */
.ml-placeholder {
  position: relative;
  background: var(--ml-surface-1);
  border: 1px solid var(--ml-border);
  border-radius: var(--ml-r-sm);
  overflow: hidden;
}
.ml-placeholder::before,
.ml-placeholder::after {
  content: "";
  position: absolute;
  inset: 0;
  background:
    linear-gradient(to top right,
      transparent calc(50% - 0.7px),
      var(--ml-border-2) calc(50% - 0.7px),
      var(--ml-border-2) calc(50% + 0.7px),
      transparent calc(50% + 0.7px));
}
.ml-placeholder::after {
  background:
    linear-gradient(to bottom right,
      transparent calc(50% - 0.7px),
      var(--ml-border-2) calc(50% - 0.7px),
      var(--ml-border-2) calc(50% + 0.7px),
      transparent calc(50% + 0.7px));
}

</style>

/* ---------- Logo: uploaded symbol + РАМ-ТВ wordmark ---------- */
function Logo({ light = false, compact = false }) {
  const ink = light ? "#ffffff" : "#141414";
  const sub = light ? "#9aa0a8" : "var(--ml-text-nav)";

    <a href={RT.HOME} style={{ display: "flex", alignItems: "center", gap: 13, textDecoration: "none" }}>

      }}>
        <img src={LOGO_DATA_URI} alt="РАМ-Т.В." style={{ width: 32, height: 32, objectFit: "contain" }} />
      </span>
      <span style={{ display: "grid", gap: 3 }}>
        <span style={{ font: "600 20px/1 Inter", letterSpacing: "0.04em", color: ink }}>РАМ-Т.В.</span>
        {!compact && (
          <span style={{ font: "500 9.5px/1 Inter", letterSpacing: "0.16em", color: sub, textTransform: "uppercase" }}>
            Негосударственная экспертиза
          </span>
        )}
      </span>
    </a>
  );
}

/* ---------- Wireframe media placeholder (signature motif: rect + cross only) ---------- */
function Placeholder({ style, radius = 10 }) {
  return (
    <div style={{
      position: "relative", background: "var(--ml-surface-1)",
      border: "1px solid var(--ml-border)", borderRadius: radius, overflow: "hidden", ...style,
    }}>
      <div style={{ position: "absolute", inset: 0, background:
        "linear-gradient(to top right, transparent calc(50% - .6px), var(--ml-border-2) calc(50% - .6px), var(--ml-border-2) calc(50% + .6px), transparent calc(50% + .6px))" }} />
      <div style={{ position: "absolute", inset: 0, background:
        "linear-gradient(to bottom right, transparent calc(50% - .6px), var(--ml-border-2) calc(50% - .6px), var(--ml-border-2) calc(50% + .6px), transparent calc(50% + .6px))" }} />
    </div>
  );
}

/* ---------- Glyph: small rect+cross placeholder that replaces decorative icons ---------- */
function Glyph({ size = 50, radius = 12, style }) {
  return <Placeholder style={{ width: size, height: size, flex: "none", ...style }} radius={radius} />;
}

/* ---------- Pill button ---------- */
function Btn({ children, variant = "solid", size = "md", onClick, style, icon, type }) {
  const base = {
    display: "inline-flex", alignItems: "center", justifyContent: "center", gap: 9,
    fontFamily: "Inter", fontWeight: 500, borderRadius: 50, cursor: "pointer",
    border: "1px solid transparent", whiteSpace: "nowrap",
    transition: "background .18s ease, transform .12s ease, border-color .18s ease, color .18s ease",
  };
  const sizes = {
    lg: { padding: "18px 40px", fontSize: 16 },
    md: { padding: "15px 34px", fontSize: 15 },
    sm: { padding: "11px 24px", fontSize: 14 },
  };
  const variants = {
    solid: { background: "#000", color: "#fff" },
    ghost: { background: "transparent", color: "var(--ml-ink-900)", borderColor: "var(--ml-border-2)" },
    light: { background: "#fff", color: "var(--ml-ink-900)" },
  };
  const [hover, setHover] = React.useState(false);
  const hoverStyle = hover
    ? (variant === "solid" ? { background: "#2a2a2a" }
      : variant === "ghost" ? { background: "var(--ml-ink-900)", color: "#fff", borderColor: "var(--ml-ink-900)" }
      : { background: "#f0f0f0" })
    : null;
  return (
    <button type={type || "button"} onClick={onClick}
      onMouseEnter={() => setHover(true)} onMouseLeave={() => setHover(false)}
      style={{ ...base, ...sizes[size], ...variants[variant], ...hoverStyle, ...style }}>
      {children}
      {icon && <Icon name={icon} size={size === "sm" ? 16 : 18} stroke={1.8} />}
    </button>
  );
}

function Chip({ children, dark }) {
  return (
    <span style={{
      display: "inline-flex", alignItems: "center", gap: 6, padding: "4px 12px", borderRadius: 5,
      border: `1px solid ${dark ? "#3a3a3a" : "var(--ml-border-badge)"}`,
      background: dark ? "transparent" : "#fff",
      font: "400 13px Inter", color: dark ? "#cfd3d8" : "var(--ml-text-slate-2)",
    }}>{children}</span>
  );
}

/* ---------- Section wrapper: 1600 column, 160 gutters at 1920 ---------- */
function Section({ children, style, id }) {
  return (
    <section id={id} style={{ width: "100%", display: "flex", justifyContent: "center", ...style }}>
      <div style={{ width: "100%", maxWidth: 1600, padding: "0 40px", boxSizing: "border-box" }}>
        {children}
      </div>
    </section>
  );
}

/* ---------- Section heading: eyebrow (num + label) + title + sub + action ---------- */
function SectionHead({ num, eyebrow, title, sub, action, onAction, actionIcon, align = "split" }) {
  const head = (
    <div style={{ maxWidth: align === "center" ? 760 : 820 }}>
      {(eyebrow || num) && (
        <div style={{ display: "flex", alignItems: "center", gap: 10, marginBottom: 18,
          justifyContent: align === "center" ? "center" : "flex-start" }}>
          {num && <span style={{ font: "500 13px Inter", color: "var(--ml-text-muted)", letterSpacing: "0.04em" }}>{num}</span>}
          {num && <span style={{ width: 26, height: 1, background: "var(--ml-border-2)" }} />}
          {eyebrow && <span style={{ font: "500 12px Inter", letterSpacing: "0.18em", textTransform: "uppercase", color: "var(--ml-text-nav)" }}>{eyebrow}</span>}
        </div>
      )}
      <h2 style={{ margin: 0, font: "500 34px/1.12 Inter", letterSpacing: "-0.01em", color: "var(--ml-ink-900)", textWrap: "balance" }}>{title}</h2>
      {sub && <p style={{ margin: "16px 0 0", font: "400 16px/27px Inter", color: "var(--ml-text-slate)", maxWidth: 560, textWrap: "pretty" }}>{sub}</p>}
    </div>
  );
  if (align === "center") {
    return <div style={{ display: "grid", placeItems: "center", textAlign: "center", marginBottom: 48 }}>{head}</div>;
  }
  return (
    <div style={{ display: "flex", alignItems: "flex-end", justifyContent: "space-between", gap: 32, marginBottom: 44, flexWrap: "wrap" }}>
      {head}
      {action && <Btn variant="ghost" size="sm" onClick={onAction} icon={actionIcon}>{action}</Btn>}
    </div>
  );
}

/* ---------- Slider arrow (round prev/next) ---------- */
function SliderArrow({ dir, onClick, disabled }) {
  return (
    <button onClick={onClick} disabled={disabled} style={{
      width: 50, height: 50, borderRadius: "50%", cursor: disabled ? "default" : "pointer",
      background: "#fff", border: "1px solid var(--ml-border-2)", display: "grid", placeItems: "center",
      opacity: disabled ? 0.4 : 1, transition: "background .15s, opacity .15s",
    }}
    onMouseEnter={(e) => { if (!disabled) e.currentTarget.style.background = "var(--ml-surface-1)"; }}
    onMouseLeave={(e) => e.currentTarget.style.background = "#fff"}>
      <Icon name={dir === "left" ? "arrowL" : "arrowR"} size={20} stroke={1.8} color="#141414" />
    </button>
  );
}

/* ---------- Generic horizontal card slider (header + track + dots) ---------- */
function CardSlider({ id, num, eyebrow, title, sub, action, actionIcon = "arrowR", onAction, perView = 3, gap = 20, children }) {
  const items = React.Children.toArray(children);
  const [idx, setIdx] = React.useState(0);
  const maxIdx = Math.max(0, items.length - perView);
  const clamp = (v) => Math.max(0, Math.min(maxIdx, v));
  React.useEffect(() => { setIdx((v) => Math.min(v, maxIdx)); }, [maxIdx]);

  return (
    <Section id={id} style={{ paddingTop: "var(--rt-gap)" }}>
      <div style={{ display: "flex", alignItems: "flex-end", justifyContent: "space-between", gap: 32, marginBottom: 44, flexWrap: "wrap" }}>
        <div style={{ maxWidth: 820 }}>
          {(eyebrow || num) && (
            <div style={{ display: "flex", alignItems: "center", gap: 10, marginBottom: 18 }}>
              {num && <span style={{ font: "500 13px Inter", color: "var(--ml-text-muted)", letterSpacing: "0.04em" }}>{num}</span>}
              {num && <span style={{ width: 26, height: 1, background: "var(--ml-border-2)" }} />}
              {eyebrow && <span style={{ font: "500 12px Inter", letterSpacing: "0.18em", textTransform: "uppercase", color: "var(--ml-text-nav)" }}>{eyebrow}</span>}
            </div>
          )}
          <h2 style={{ margin: 0, font: "500 34px/1.12 Inter", letterSpacing: "-0.01em", color: "var(--ml-ink-900)", textWrap: "balance" }}>{title}</h2>
          {sub && <p style={{ margin: "16px 0 0", font: "400 16px/27px Inter", color: "var(--ml-text-slate)", maxWidth: 560, textWrap: "pretty" }}>{sub}</p>}
        </div>
        {maxIdx > 0 && (
          <div style={{ display: "flex", gap: 12 }}>
            <SliderArrow dir="left" disabled={idx === 0} onClick={() => setIdx((v) => clamp(v - 1))} />
            <SliderArrow dir="right" disabled={idx >= maxIdx} onClick={() => setIdx((v) => clamp(v + 1))} />
          </div>
        )}
      </div>

      <div style={{ overflow: "hidden" }}>
        <div style={{ display: "flex", gap: gap, transition: "transform .5s cubic-bezier(.4,0,.1,1)",
          transform: `translateX(calc(${-idx} * (100% + ${gap}px) / ${perView}))` }}>
          {items.map((child, i) => (
            <div key={i} style={{ flex: `0 0 calc((100% - ${gap * (perView - 1)}px) / ${perView})`, boxSizing: "border-box", display: "flex" }}>
              <div style={{ width: "100%" }}>{child}</div>
            </div>
          ))}
        </div>
      </div>

      {(maxIdx > 0 || action) && (
        <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", marginTop: 32, gap: 24, flexWrap: "wrap" }}>
          <div style={{ display: "flex", gap: 7 }}>
            {Array.from({ length: maxIdx + 1 }).map((_, i) => (
              <button key={i} onClick={() => setIdx(i)} aria-label={`Слайд ${i + 1}`} style={{
                width: i === idx ? 30 : 9, height: 9, borderRadius: 50, border: "none", cursor: "pointer",
                background: i === idx ? "#141414" : "var(--ml-border-2)", transition: "all .25s ease", padding: 0 }} />
            ))}
          </div>
          {action && <Btn variant="ghost" size="sm" icon={actionIcon} onClick={onAction}>{action}</Btn>}
        </div>
      )}
    </Section>
  );
}

const fieldStyle = {

function plural(n, forms) {
  const a = Math.abs(n) % 100, b = a % 10;

  return forms[2];
}

        if (!el) return false;
        const y = el.getBoundingClientRect().top + window.scrollY - 120;
        window.scrollTo({ top: y, behavior: "smooth" });
        return true;
      };
      // React mounts synchronously, but wait a frame for layout/fonts before measuring.
      requestAnimationFrame(() => { if (!scrollToHash()) setTimeout(scrollToHash, 150); });
    }, []);

    return (
      <div>
        <Header onCalc={openCalc} />
        <main>
          <PageHero
            eyebrow="Услуги"
            crumbs={[{ label: "Главная", href: RT.HOME }, { label: "Услуги" }]}
            title="Экспертиза и сопровождение проектов"
            lead="Проводим негосударственную экспертизу проектной документации, результатов инженерных изысканий и сметной документации, а также сопровождаем проект на всех этапах согласования."
            visualIcon="layers" visualLabel="Услуги компании"
            actions={<React.Fragment>
              <Btn size="lg" onClick={openCalc} icon="arrowR">Рассчитать стоимость</Btn>
              <a href="tel:+74951234567" style={{ display: "grid", gap: 2, textDecoration: "none" }}>
                <span style={{ font: "600 19px Inter", color: "#141414", whiteSpace: "nowrap" }}>+7 (495) 123-45-67</span>
                <span style={{ font: "400 13px Inter", color: "var(--ml-text-nav)" }}>Консультация бесплатно</span>
              </a>
            </React.Fragment>} />

          <ServiceGroupBlock grp={SERVICE_GROUPS[0]} num="01" />
          <ServiceGroupBlock grp={SERVICE_GROUPS[1]} num="02" />
          <StagesGrid num="03" title="Этапы оказания услуг" />
        </main>
        <Footer onCalc={openCalc} />
        <CalcModal open={calc} onClose={() => setCalc(false)} />
      </div>
    );
  }
  ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
